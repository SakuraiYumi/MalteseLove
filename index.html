<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小狗汪汪队 💖 恋爱记录局</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="user-avatars-small">
                <img src="https://i.pinimg.com/736x/1e/c6/4c/1ec64c28cbce99261f09741f21722619.jpg" alt="小狗 A" class="avatar-small">
                <img src="https://i.pinimg.com/736x/ab/e5/4b/abe54be077392cc5792ba49568955c56.jpg" alt="小狗 B" class="avatar-small">
            </div>
            <div class="nav-links">
                <div class="nav-links">
                    <a href="index.html" class="nav-btn active">首页</a>
                    <a href="daily.html" class="nav-btn">日常</a>
                    <a href="anniversary.html" class="nav-btn">纪念日</a>
                    <a href="wish.html" class="nav-btn">心愿</a>
                    <a href="memory.html" class="nav-btn">回忆</a>
                </div>
            </div>
        </nav>

        <section class="love-timer-section">
            <div class="timer-container">
                <img src="https://i.pinimg.com/736x/ed/99/44/ed9944148ccb69fd602d6ff409cdce6c.jpg" alt="Doris" class="timer-puppy">
                <div class="timer-content">
                    <p class="timer-title">我们已相爱</p>
                    <p class="timer-days"><span id="days">?</span> 天</p>
                    <p class="timer-date">从 2025年06月22日 开始 ✏️</p>
                </div>
                <img src="https://i.pinimg.com/736x/61/12/3e/61123e0d5b80fec0e29878e04dd41252.jpg" alt="Richard" class="timer-puppy">
            </div>
        </section>

        <section class="anniversary-section card box-shadow">
            <p class="section-title"><img src="https://img.icons8.com/emoji/48/000000/calendar-emoji.png" alt="icon"> 即将到来的纪念日</p>
            <div class="anniversary-details">
                <div class="ann-item">
                    <img src="https://i.pinimg.com/736x/b2/4b/ab/b24babcb8298538e26c2425b699402a2.jpg" alt="gif icon">
                    <div class="text">
                        <p class="ann-title">一周年 🎉</p>
                        <p class="ann-countdown" id="ann-countdown">计算中...</p>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 80%;"></div>
                </div>
            </div>
        </section>

        <section class="quick-links-section">
                    <p class="section-title"><img src="https://img.icons8.com/emoji/48/000000/star-emoji.png" alt="icon"> 快速入口</p>
                    <div class="links-grid">
                        <a href="daily.html" class="link-item card box-shadow">
                            <img src="https://i.pinimg.com/736x/03/59/d6/0359d680627c9eb8d423fddc197ebce5.jpg" alt="日常">
                            <p class="link-title">日常记录</p>
                            <p class="link-sub">记录美好瞬间</p>
                        </a>
                        
                        <a href="anniversary.html" class="link-item card box-shadow">
                            <img src="https://i.pinimg.com/1200x/ee/0c/99/ee0c992a703b10f31c0ceb15d2d5eaeb.jpg" alt="纪念日">
                            <p class="link-title">纪念日</p>
                            <p class="link-sub">重要的日子</p>
                        </a>
                        
                        <a href="wish.html" class="link-item card box-shadow">
                            <img src="https://i.pinimg.com/1200x/3e/3f/36/3e3f36507cb56d56157243994060d66a.jpg" alt="心愿">
                            <p class="link-title">心愿清单</p>
                            <p class="link-sub">未来的计划</p>
                        </a>
                        
                        <a href="memory.html" class="link-item card box-shadow">
                            <img src="https://i.pinimg.com/736x/84/4c/02/844c02c8639038d394ccb7af8e7b74ba.jpg" alt="回忆">
                            <p class="link-title">回忆库</p>
                            <p class="link-sub">珍藏的时光</p>
                        </a>
                    </div>
                </section>

        <section class="photo-stream-section links-grid-photos">
            <div class="photo-card card box-shadow">
                <img src="https://i.pinimg.com/736x/6e/a6/ad/6ea6ad6c307fd568b2379c20df95760e.jpg" alt="旅行" class="photo-main">
                <p class="photo-caption">“和你一起看过的风景，都是最美的画面”</p>
            </div>
            <div class="photo-card card box-shadow">
                <img src="https://i.pinimg.com/736x/19/a5/5a/19a55ad56e4118df057bb24150d909cc.jpg" alt="踏春" class="photo-main">
                <p class="photo-caption">“只要有你在身边，每一天都是好天气”</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
