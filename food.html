<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小狗美食探店 🍔</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="user-avatars-small">
                <img src="https://i.pinimg.com/736x/1e/c6/4c/1ec64c28cbce99261f09741f21722619.jpg" alt="小狗 A" class="avatar-small">
                <img src="https://i.pinimg.com/736x/ab/e5/4b/abe54be077392cc5792ba49568955c56.jpg" alt="小狗 B" class="avatar-small">
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">首页</a>
                <a href="daily.html" class="nav-btn">日常</a>
                <a href="anniversary.html" class="nav-btn">纪念日</a>
                <a href="wish.html" class="nav-btn">心愿</a>
                <a href="food.html" class="nav-btn active">美食</a>
            </div>
        </nav>

        <div style="background: #FFF0F2; border: 2px solid #2D2D2D; border-radius: 12px; padding: 10px; text-align: center; margin-top: 15px; font-weight: bold; box-shadow: 2px 2px 0 #2D2D2D; font-size: 16px;">
            ✨ 🐾 我们的足迹：共打卡了 <span id="food-count" style="color: #FF879A; font-size: 20px;">0</span> 家美食探店！
        </div>

        <section class="search-section" style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="search-food" placeholder="🔍 搜索店名、地点或评价..." oninput="searchFood()" style="flex: 2; min-width: 200px; padding: 12px; border: 2px solid #2D2D2D; border-radius: 12px; font-family: inherit; font-size: 14px; box-shadow: 2px 2px 0 #2D2D2D;">
            <input type="date" id="search-date" oninput="searchFood()" style="flex: 1; min-width: 130px; padding: 12px; border: 2px solid #2D2D2D; border-radius: 12px; font-family: inherit; font-size: 14px; box-shadow: 2px 2px 0 #2D2D2D; background: white;">
        </section>

        <section class="card box-shadow" style="margin-top: 20px;">
            <p class="section-title" id="form-title"><img src="https://img.icons8.com/emoji/48/000000/hamburger-emoji.png" alt="icon"> 记录新探店</p>
            
            <input type="hidden" id="editing-id" value="">

            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="food-input-file" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    <label for="food-input-file" id="upload-label" style="background-color: #FF879A; color: white; border: 2px solid #2D2D2D; padding: 10px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 3px 3px 0 #2D2D2D; font-size: 14px;">📷 上传美食照片</label>
                    
                    <div id="image-preview-container" style="display: none; width: 60px; height: 60px; border: 2px solid #2D2D2D; border-radius: 10px; overflow: hidden; background: white;">
                        <img id="image-preview" src="" alt="预览" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </div>

                <input type="text" id="food-input-name" placeholder="🏷️ 店铺名称 (如：隔壁老王烧烤)" style="width: 100%; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit;">
                <input type="text" id="food-input-location" placeholder="📍 探店地点 (如：新街口/金虹路)" style="width: 100%; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit;">
                
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 14px; font-weight: bold; white-space: nowrap;">📅 探店日期:</span>
                    <input type="date" id="food-input-date" style="width: 100%; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit; background: white;">
                </div>

                <select id="food-input-rating" style="width: 100%; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit; background: white; font-size: 14px;">
                    <option value="⭐⭐⭐⭐⭐ 夯">⭐⭐⭐⭐⭐ 夯</option>
                    <option value="⭐⭐⭐⭐ 顶级">⭐⭐⭐⭐ 顶级</option>
                    <option value="⭐⭐⭐ 人上人">⭐⭐⭐ 人上人</option>
                    <option value="⭐⭐ NPC">⭐⭐ NPC</option>
                    <option value="⭐ 拉完了">⭐ 拉完了</option>
                </select>

                <textarea id="food-input-comment" placeholder="📝 写下你们的干饭评价..." style="width: 100%; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit; resize: none; height: 60px; font-size: 14px;"></textarea>

                <div style="display: flex; gap: 10px;">
                    <button id="add-food-btn" style="flex: 3; background-color: #2D2D2D; color: white; border: 2px solid #2D2D2D; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 3px 3px 0 #FF879A; font-size: 16px;">收录进美食局 🍔</button>
                    <button id="cancel-edit-btn" style="display: none; flex: 1; background-color: #ECECEC; color: #2D2D2D; border: 2px solid #2D2D2D; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 3px 3px 0 #2D2D2D; font-size: 14px;" onclick="resetForm()">取消</button>
                </div>
            </div>
        </section>

        <section class="photo-stream-section links-grid-photos" id="food-list" style="margin-top: 20px;">
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
