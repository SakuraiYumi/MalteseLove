<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小狗的日常记录 🐾</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="user-avatars-small">
                <img src="https://i.pinimg.com/736x/1e/c6/4c/1ec64c28cbce99261f09741f21722619.jpg" alt="小狗 A" class="avatar-small">
                <img src="https://i.pinimg.com/736x/ab/e5/4b/abe54be077392cc5792ba49568955c56.jpg" alt="小狗 B" class="avatar-small">
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">首页</a>
                <a href="daily.html" class="nav-btn active">日常</a>
                <a href="anniversary.html" class="nav-btn">纪念日</a>
                <a href="wish.html" class="nav-btn">心愿</a>
                <a href="memory.html" class="nav-btn">回忆</a>
            </div>
        </nav>

        <section class="card box-shadow">
                    <p class="section-title">🐱 碎碎念日记流</p>
                    
                    <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 3px solid #2D2D2D;">
                        <textarea id="diary-input" placeholder="在这写下今天的可爱日常吧..." style="width: 100%; height: 80px; padding: 10px; border: 2px solid #2D2D2D; border-radius: 10px; font-family: inherit; resize: none;"></textarea>
                        <button id="add-diary-btn" style="background-color: var(--pink-accent); color: white; border: 2px solid #2D2D2D; padding: 8px; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 3px 3px 0 #2D2D2D;">丢进小狗日记本 🐾</button>
                    </div>

                    <div id="diary-list"></div>
                </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
